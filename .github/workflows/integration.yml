name: Integration

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  Lint:
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.1
          github_token: ${{ github.token }}
      - run: just fmt-check

  Test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Ensure Homebrew
        shell: zsh {0}
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
      - run: brew bundle --file="${{ github.workspace }}/home/Brewfile.ci"
        shell: zsh {0}
      - run: mise install
        shell: zsh {0}
        env:
          MISE_GITHUB_TOKEN: ${{ github.token }}
      - run: ${{ github.workspace }}/setup.sh
        shell: zsh {0}
        env:
          VIRTUAL_HOME: ${{ github.workspace }}/home
      - run: nu ${{ github.workspace }}/scripts/configure-apps.nu
        shell: zsh {0}
      - run: just helix-theme-build
        shell: zsh {0}
