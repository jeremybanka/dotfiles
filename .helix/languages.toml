[language-server.vscode-eslint-language-server]
command = "bun"
args = ["/Users/jem/dotfiles/scripts/eslint-lsp-push-proxy.ts"]

[language-server.vscode-eslint-language-server.config]
validate = "on"
packageManager = "bun"
useFlatConfig = true
experimental = { useFlatConfig = false }
rulesCustomizations = []
run = "onType"
problems = { shortenToSingleLine = false }
nodePath = ""
options = {}
codeActionOnSave = { mode = "all" }
format = true

[language-server.vscode-eslint-language-server.config.codeAction.disableRuleComment]
enable = true
location = "separateLine"

[language-server.vscode-eslint-language-server.config.codeAction.showDocumentation]
enable = true

[language-server.vscode-eslint-language-server.config.workingDirectory]
directory = "/Users/jem/dotfiles"

[language-server.typescript-language-server]
command = "./node_modules/.bin/typescript-language-server"
args = ["--stdio"]

[[language]]
name = "javascript"
auto-format = true
language-servers = [
	{ name = "vscode-eslint-language-server", only-features = [
		"diagnostics",
		"code-action",
		"format",
		"workspace-command",
	] },
	{ name = "typescript-language-server", except-features = ["format"] },
]

[[language]]
name = "jsx"
auto-format = true
language-servers = [
	{ name = "vscode-eslint-language-server", only-features = [
		"diagnostics",
		"code-action",
